<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Garbage Collection Visualizer</title>
<meta name="description" content="Interactive JavaScript garbage collection visualizer. V8 generational GC, Mark-Sweep, Scavenge, Mark-Compact, heap regions (Young/Old), promotion, memory pressure. Step-through GC cycles.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;background:#111128;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:1.1rem;color:#ffa94d}
.controls{display:flex;gap:8px;align-items:center;margin-left:auto}
.controls button{padding:6px 14px;border:1px solid #3a3a6a;border-radius:6px;background:#1a1a3a;color:#e0e0e0;cursor:pointer;font-size:.85rem}
.controls button:hover{background:#2a2a5a}
.controls button.primary{background:#e8590c;border-color:#f76707;color:#fff}
select{padding:6px 10px;border:1px solid #3a3a6a;border-radius:6px;background:#1a1a3a;color:#e0e0e0;font-size:.85rem}
.main{display:flex;flex:1;overflow:hidden}
.vis-col{flex:1;overflow:auto;padding:16px}
.sidebar{width:340px;border-left:1px solid #2a2a4a;display:flex;flex-direction:column;overflow:auto}
.tab-bar{display:flex;border-bottom:1px solid #2a2a4a}
.tab-bar button{flex:1;padding:8px;background:none;border:none;color:#888;cursor:pointer;font-size:.8rem;border-bottom:2px solid transparent}
.tab-bar button.active{color:#ffa94d;border-bottom-color:#ffa94d}
.tab-content{flex:1;overflow:auto;padding:12px}
.panel{background:#111128;border:1px solid #2a2a4a;border-radius:8px;padding:16px;margin-bottom:12px}
.panel h3{font-size:.9rem;margin-bottom:10px;color:#ffa94d}
.heap-layout{display:flex;gap:12px;margin-bottom:12px}
.heap-region{flex:1;border:2px solid #2a2a4a;border-radius:8px;padding:10px;min-height:180px}
.heap-region h4{font-size:.8rem;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.region-young{border-color:#4dabf7}
.region-young h4{color:#4dabf7}
.region-old{border-color:#ffa94d}
.region-old h4{color:#ffa94d}
.region-large{border-color:#cc5de8}
.region-large h4{color:#cc5de8}
.heap-bar{height:6px;background:#1a1a3a;border-radius:3px;margin-bottom:8px;overflow:hidden}
.heap-fill{height:100%;border-radius:3px;transition:width .3s}
.fill-young{background:#4dabf7}
.fill-old{background:#ffa94d}
.fill-large{background:#cc5de8}
.obj-grid{display:flex;flex-wrap:wrap;gap:4px}
.obj{width:44px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;transition:all .4s;cursor:default;position:relative}
.obj-alive{background:rgba(105,219,124,.25);border:1px solid #69db7c;color:#69db7c}
.obj-dead{background:rgba(255,107,107,.15);border:1px solid #ff6b6b;color:#ff6b6b}
.obj-marked{background:rgba(255,212,59,.2);border:1px solid #ffd43b;color:#ffd43b;box-shadow:0 0 6px rgba(255,212,59,.3)}
.obj-swept{opacity:0;transform:scale(.5)}
.obj-promoted{background:rgba(204,93,232,.25);border:1px solid #cc5de8;color:#cc5de8;animation:promote .5s}
.obj-root{border-width:2px}
@keyframes promote{0%{transform:translateY(-20px);opacity:0}100%{transform:translateY(0);opacity:1}}
.gc-phase{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.phase-badge{padding:6px 12px;border-radius:16px;font-size:.75rem;font-weight:600;border:2px solid transparent;opacity:.3;transition:all .3s}
.phase-badge.active{opacity:1;transform:scale(1.05)}
.phase-badge.done{opacity:.6}
.ph-idle{border-color:#69db7c;color:#69db7c}.ph-idle.active{background:rgba(105,219,124,.15)}
.ph-mark{border-color:#ffd43b;color:#ffd43b}.ph-mark.active{background:rgba(255,212,59,.15)}
.ph-sweep{border-color:#ff6b6b;color:#ff6b6b}.ph-sweep.active{background:rgba(255,107,107,.15)}
.ph-compact{border-color:#cc5de8;color:#cc5de8}.ph-compact.active{background:rgba(204,93,232,.15)}
.ph-scavenge{border-color:#4dabf7;color:#4dabf7}.ph-scavenge.active{background:rgba(77,171,247,.15)}
.step-desc{padding:8px 12px;background:#0d0d20;border:1px solid #2a2a4a;border-radius:6px;font-size:.8rem;line-height:1.5;margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:#0d0d20;border:1px solid #2a2a4a;border-radius:6px;padding:8px;text-align:center}
.stat .label{font-size:.65rem;color:#888;margin-bottom:2px}
.stat .value{font-size:1.1rem;font-weight:700}
.stat .val-young{color:#4dabf7}
.stat .val-old{color:#ffa94d}
.stat .val-freed{color:#69db7c}
.info-card{background:#0d0d20;border:1px solid #2a2a4a;border-radius:6px;padding:10px;margin-bottom:8px}
.info-card h4{font-size:.8rem;margin-bottom:6px;color:#ffa94d}
.info-card p{font-size:.75rem;line-height:1.5;color:#aaa}
.ref-table{width:100%;border-collapse:collapse;font-size:.75rem}
.ref-table th{text-align:left;padding:6px 8px;border-bottom:1px solid #2a2a4a;color:#ffa94d}
.ref-table td{padding:6px 8px;border-bottom:1px solid #1a1a3a}
@media(max-width:900px){.main{flex-direction:column}.sidebar{width:100%;max-height:40vh;border-left:none;border-top:1px solid #2a2a4a}.heap-layout{flex-direction:column}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
<h1>JS Garbage Collection</h1>
<select id="scenarioSelect"></select>
<div class="controls">
<button onclick="stepBack()">← Back</button>
<button onclick="stepForward()" class="primary">Step →</button>
<button onclick="autoPlay()">▶ Auto</button>
<button onclick="reset()">Reset</button>
</div>
</header>
<div class="main">
<div class="vis-col">
<div class="gc-phase" id="phases"></div>
<div class="step-desc" id="stepDesc">Select a scenario and step through the GC cycle.</div>
<div class="panel"><h3>V8 Heap</h3>
<div class="heap-layout" id="heapLayout"></div>
<div class="stats" id="stats"></div>
</div>
</div>
<div class="sidebar">
<div class="tab-bar">
<button class="active" onclick="switchTab('detail')">Details</button>
<button onclick="switchTab('reference')">Reference</button>
</div>
<div class="tab-content" id="tabContent"></div>
</div>
</div>
<script>
const SCENARIOS=[
{name:'Minor GC (Scavenge)',
 phases:['Idle','Scavenge','Promote','Complete'],
 phaseClasses:['ph-idle','ph-scavenge','ph-compact','ph-idle'],
 initial:{young:[
  {id:'a',label:'A',alive:true,root:true},{id:'b',label:'B',alive:true},{id:'c',label:'C',alive:false},
  {id:'d',label:'D',alive:false},{id:'e',label:'E',alive:true},{id:'f',label:'F',alive:false},
  {id:'g',label:'G',alive:true,root:true},{id:'h',label:'H',alive:false}
 ],old:[{id:'x',label:'X',alive:true,root:true},{id:'y',label:'Y',alive:true}],large:[]},
 steps:[
  {phase:0,desc:'Young Generation is 70% full. V8 triggers a Minor GC (Scavenge). Only the young generation is collected — old generation is untouched.',detail:'V8\'s young generation uses a semi-space collector (Scavenge). It divides young space into two equal halves: from-space (active) and to-space (empty). Objects are allocated in from-space.'},
  {phase:1,desc:'Phase 1: Trace roots. Find all objects reachable from GC roots (global scope, stack, handles). A, E, G are reachable. Root objects are marked.',detail:'GC roots include: global object, current stack frames, handle scopes, and remembered set (references from old→young). The scavenger traces from these roots.', markAlive:true},
  {phase:1,desc:'Phase 2: Copy alive objects from from-space to to-space. Dead objects (C, D, F, H) are simply abandoned — no explicit freeing needed.',detail:'The Cheney algorithm copies live objects to to-space. Dead objects are left behind. After copying, from-space is completely discarded. This is why scavenge is fast: only live objects are touched.', sweep:true},
  {phase:2,desc:'Phase 3: Check survival count. Objects that survived 2+ scavenges are promoted to Old Generation. B and E get promoted.',detail:'V8 tracks how many scavenges each object survived. After 2 survivals (configurable), objects are "tenured" — copied to old generation instead of to-space. This is the generational hypothesis: most objects die young.', promote:['b','e']},
  {phase:3,desc:'Scavenge complete! from-space and to-space swap roles. Young generation is now clean with only surviving objects. Freed 4 objects.',detail:'After scavenge: to-space becomes the new from-space, old from-space is wiped. Total pause: typically <1ms for young generation. Fast because young gen is small (1-8MB) and most objects are dead.'}
 ]
},
{name:'Major GC (Mark-Sweep)',
 phases:['Idle','Mark','Sweep','Complete'],
 phaseClasses:['ph-idle','ph-mark','ph-sweep','ph-idle'],
 initial:{young:[{id:'n1',label:'N1',alive:true,root:true},{id:'n2',label:'N2',alive:true}],
 old:[
  {id:'a',label:'A',alive:true,root:true},{id:'b',label:'B',alive:true},{id:'c',label:'C',alive:false},
  {id:'d',label:'D',alive:false},{id:'e',label:'E',alive:true},{id:'f',label:'F',alive:false},
  {id:'g',label:'G',alive:false},{id:'h',label:'H',alive:true,root:true},{id:'i',label:'I',alive:false},
  {id:'j',label:'J',alive:true}
 ],large:[]},
 steps:[
  {phase:0,desc:'Old Generation is 75% full. V8 triggers a Major GC (Mark-Sweep-Compact). This collects the ENTIRE heap — both young and old generations.',detail:'Major GC is triggered when old generation grows beyond a threshold. V8 uses tri-color marking: white (not visited), grey (visited but children not scanned), black (visited and all children scanned).'},
  {phase:1,desc:'Mark Phase: Start from GC roots. Mark A (root) as grey, then scan its references. A→B reachable, mark B grey.',detail:'Marking starts from roots: global object, stack, handles. Each reachable object is marked. V8 uses incremental marking — marking is interleaved with JavaScript execution to reduce pause times.', markRoots:true},
  {phase:1,desc:'Continue marking: B→E reachable, H (root) → J reachable. All grey objects scanned and turned black. Unreachable: C, D, F, G, I.',detail:'After marking: live objects (A,B,E,H,J) are black. Dead objects (C,D,F,G,I) remain white. The mark bitmap records which objects are alive without modifying objects themselves.', markAll:true},
  {phase:2,desc:'Sweep Phase: Walk through old generation. Reclaim memory from unmarked (white) objects. Add freed memory to free-list.',detail:'Sweeping iterates through old generation pages. Dead objects are added to the free-list for future allocation. V8 uses lazy sweeping — pages are swept on demand when allocation needs memory, not all at once.', sweep:true},
  {phase:3,desc:'Major GC complete! Freed 5 old-gen objects. Free-list updated. If fragmentation is high, Mark-Compact would also defragment.',detail:'Mark-Sweep doesn\'t move objects (no compaction). This can lead to fragmentation. If fragmentation exceeds a threshold, V8 uses Mark-Compact instead, which moves live objects together and eliminates gaps.'}
 ]
},
{name:'Mark-Compact (Defragmentation)',
 phases:['Idle','Mark','Compact','Update Ptrs','Complete'],
 phaseClasses:['ph-idle','ph-mark','ph-compact','ph-mark','ph-idle'],
 initial:{young:[],
 old:[
  {id:'a',label:'A',alive:true,root:true},{id:'_1',label:'—',alive:false},{id:'b',label:'B',alive:true},
  {id:'_2',label:'—',alive:false},{id:'_3',label:'—',alive:false},{id:'c',label:'C',alive:true},
  {id:'_4',label:'—',alive:false},{id:'d',label:'D',alive:true,root:true},{id:'_5',label:'—',alive:false},
  {id:'_6',label:'—',alive:false}
 ],large:[]},
 steps:[
  {phase:0,desc:'Old generation is fragmented: live objects (A,B,C,D) are scattered with gaps between them. Allocation of large objects fails despite having enough total free space.',detail:'Fragmentation occurs when small objects are freed, leaving gaps. A 1KB allocation might fail even with 10KB total free space if no single gap is large enough. This triggers compaction.'},
  {phase:1,desc:'Mark Phase: Same as Mark-Sweep. Identify live objects: A, B, C, D. Dead gaps: —, —, —, —, —, —.',detail:'Marking is identical to Mark-Sweep. The difference comes in the next phase: instead of just freeing dead objects, live objects will be moved together.', markAll:true},
  {phase:2,desc:'Compact Phase: Move live objects to the beginning of the page. A stays, B slides left to fill gap, C and D follow.',detail:'Compaction copies live objects toward the start of the memory page, eliminating gaps. This is expensive (requires copying and pointer updating) but eliminates fragmentation.', compact:true},
  {phase:3,desc:'Update Pointers: All references to moved objects (B, C, D) must be updated to point to their new addresses.',detail:'Every pointer in the heap, stack, and handle storage that points to a moved object must be updated. V8 uses a forwarding table: old address → new address. This is the most expensive part of compaction.'},
  {phase:4,desc:'Compact complete! Old generation is now contiguous. No fragmentation. Large allocations can succeed. Memory returned to OS if pages are empty.',detail:'After compaction: live objects are packed together, free space is at the end. This enables bump-pointer allocation (fast). V8 can also return empty pages to the OS, reducing RSS.'}
 ]
},
{name:'Incremental Marking',
 phases:['Allocate','Mark (inc.)','JS runs','Mark (inc.)','Sweep','Complete'],
 phaseClasses:['ph-idle','ph-mark','ph-idle','ph-mark','ph-sweep','ph-idle'],
 initial:{young:[{id:'n1',label:'N',alive:true,root:true}],
 old:[
  {id:'a',label:'A',alive:true,root:true},{id:'b',label:'B',alive:true},{id:'c',label:'C',alive:false},
  {id:'d',label:'D',alive:true},{id:'e',label:'E',alive:false},{id:'f',label:'F',alive:true},
  {id:'g',label:'G',alive:false},{id:'h',label:'H',alive:true}
 ],large:[]},
 steps:[
  {phase:0,desc:'Heap is growing. V8 starts Major GC but uses Incremental Marking to avoid long pauses. Marking is split into small chunks interleaved with JS execution.',detail:'Without incremental marking, a Major GC on a large heap could pause for 50-200ms — unacceptable for interactive apps. Incremental marking breaks the pause into many <1ms chunks.'},
  {phase:1,desc:'Marking chunk 1 (~1ms): Mark root objects A. Scan A\'s references → B reachable (mark grey). Write barrier active.',detail:'V8 uses a write barrier: whenever JS code modifies a pointer in an already-scanned (black) object, the barrier marks the target grey. This ensures correctness when JS runs between marking chunks.', markRoots:true},
  {phase:2,desc:'JavaScript runs! User code executes. New objects may be allocated, references may change. Write barrier catches any pointer modifications.',detail:'Between marking chunks, JavaScript runs normally. If JS code writes a reference into a black object (already scanned), the write barrier re-marks it grey so it\'s rescanned. This is the Dijkstra-style barrier.'},
  {phase:3,desc:'Marking chunk 2 (~1ms): Continue scanning grey objects. B→D, D→F, F→H all reachable. C, E, G are unreachable (white).',detail:'The grey worklist is processed incrementally. Each chunk pops objects from the worklist, scans their references, and marks reachable objects. When the worklist is empty, marking is done.', markAll:true},
  {phase:4,desc:'Sweep: Lazy sweeping frees dead objects (C, E, G) on demand. Sweep happens during allocation — no separate pause.',detail:'V8 uses concurrent sweeping: a background thread sweeps pages while the main thread runs JS. Sweeping happens page-by-page when the allocator needs more memory. Total GC pause: ~2ms instead of ~50ms.', sweep:true},
  {phase:5,desc:'GC complete! Total wall time was longer, but max pause was <2ms. JS execution was barely interrupted. User sees no jank.',detail:'Incremental + concurrent GC in V8: marking is incremental (small chunks on main thread), sweeping is concurrent (background thread). The generational hypothesis + incremental marking = smooth 60fps even with GC.'}
 ]
},
{name:'Memory Leak Patterns',
 phases:['Allocate','Leak','GC attempt','Still alive!','OOM risk'],
 phaseClasses:['ph-idle','ph-mark','ph-sweep','ph-mark','ph-sweep'],
 initial:{young:[],
 old:[
  {id:'a',label:'Listener',alive:true,root:true},{id:'b',label:'DOM ref',alive:true},
  {id:'c',label:'Closure',alive:true},{id:'d',label:'Timer',alive:true,root:true},
  {id:'e',label:'Cache',alive:true},{id:'f',label:'Cache',alive:true},
  {id:'g',label:'Cache',alive:true},{id:'h',label:'Cache',alive:true}
 ],large:[]},
 steps:[
  {phase:0,desc:'Application runs. Objects are allocated: event listeners, DOM references, closures, timers, and an unbounded cache.',detail:'Memory leaks occur when objects that should be garbage are still reachable. The GC is working correctly — the bug is in the application code keeping references alive.'},
  {phase:1,desc:'Leak sources: (1) Listener — addEventListener without removeEventListener. (2) DOM ref — JS holds reference to removed DOM node. (3) Closure captures large scope.',detail:'Common leak patterns: forgotten event listeners (especially on window/document), detached DOM trees still referenced from JS, closures that capture more variables than needed, forgotten setInterval/setTimeout.', markAll:true},
  {phase:2,desc:'GC runs Mark-Sweep. All 8 objects are reachable from roots! Timer is a root (registered with runtime). Listener is attached to a living DOM node.',detail:'The GC correctly identifies all objects as alive — they ARE reachable. The problem is that the application forgot to clean up references. GC cannot fix application logic bugs.'},
  {phase:3,desc:'More cache objects allocated. Cache grows without bound because nothing evicts old entries. Old generation keeps growing.',detail:'Unbounded caches (Map/Set/Array that only grow, never shrink) are the #1 memory leak in Node.js. Fix: use WeakMap (auto-GC when key is unreachable), or implement LRU eviction.'},
  {phase:4,desc:'Old generation hits limit. V8 increases heap limit, then triggers aggressive GC. If still OOM → process crashes with "JavaScript heap out of memory".',detail:'Fixes: (1) removeEventListener when done. (2) Set DOM refs to null after removal. (3) Use WeakRef/WeakMap for caches. (4) clearInterval/clearTimeout. (5) Use Chrome DevTools Memory tab → Heap Snapshot → Retainers to find leak sources.'}
 ]
}
];

let curScenario=0,curStep=-1,heapState=null,autoInterval=null,currentTab='detail';

function init(){
  const sel=document.getElementById('scenarioSelect');
  SCENARIOS.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s.name;sel.appendChild(o)});
  sel.onchange=()=>{curScenario=+sel.value;reset()};
  reset();
}

function reset(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null}
  const s=SCENARIOS[curScenario];
  heapState={young:s.initial.young.map(o=>({...o,state:'normal'})),old:s.initial.old.map(o=>({...o,state:'normal'})),large:s.initial.large.map(o=>({...o,state:'normal'}))};
  curStep=-1;render();
}

function applyStep(step){
  if(step.markRoots){
    heapState.young.forEach(o=>{if(o.root&&o.alive)o.state='marked'});
    heapState.old.forEach(o=>{if(o.root&&o.alive)o.state='marked'});
  }
  if(step.markAlive||step.markAll){
    heapState.young.forEach(o=>{o.state=o.alive?'marked':'dead'});
    heapState.old.forEach(o=>{o.state=o.alive?'marked':'dead'});
  }
  if(step.sweep){
    heapState.young=heapState.young.filter(o=>o.alive);
    heapState.old=heapState.old.filter(o=>o.alive);
    heapState.young.forEach(o=>o.state='normal');
    heapState.old.forEach(o=>o.state='normal');
  }
  if(step.promote){
    step.promote.forEach(id=>{
      const idx=heapState.young.findIndex(o=>o.id===id);
      if(idx>=0){
        const obj=heapState.young.splice(idx,1)[0];
        obj.state='promoted';
        heapState.old.push(obj);
      }
    });
  }
  if(step.compact){
    heapState.old=heapState.old.filter(o=>o.alive);
    heapState.old.forEach(o=>o.state='normal');
  }
}

function render(){
  const s=SCENARIOS[curScenario];
  // Phases
  const phaseIdx=curStep>=0?s.steps[curStep].phase:-1;
  document.getElementById('phases').innerHTML=s.phases.map((p,i)=>{
    let cls=s.phaseClasses[i];
    if(i===phaseIdx)cls+=' active';
    else if(i<phaseIdx)cls+=' done';
    return `<div class="phase-badge ${cls}">${p}</div>`;
  }).join('');

  // Step description
  const step=s.steps[curStep];
  document.getElementById('stepDesc').textContent=step?step.desc:'Select a scenario and step through the GC cycle.';

  // Heap
  renderHeap();
  // Stats
  renderStats();
  renderTab();
}

function renderHeap(){
  const el=document.getElementById('heapLayout');
  function renderRegion(name,cls,fillCls,objects,maxSize){
    const pct=Math.min(100,objects.length/maxSize*100);
    let html=`<div class="heap-region ${cls}"><h4>${name} <span style="font-size:.65rem;color:#888">${objects.length} objects</span></h4>`;
    html+=`<div class="heap-bar"><div class="heap-fill ${fillCls}" style="width:${pct}%"></div></div>`;
    html+=`<div class="obj-grid">`;
    objects.forEach(o=>{
      let objCls='obj-alive';
      if(o.state==='marked')objCls='obj-marked';
      else if(o.state==='dead')objCls='obj-dead';
      else if(o.state==='swept')objCls='obj-swept';
      else if(o.state==='promoted')objCls='obj-promoted';
      if(o.root)objCls+=' obj-root';
      html+=`<div class="obj ${objCls}" title="${o.label}${o.root?' (root)':''}">${o.label}</div>`;
    });
    html+=`</div></div>`;
    return html;
  }
  el.innerHTML=renderRegion('Young Generation','region-young','fill-young',heapState.young,12)+
    renderRegion('Old Generation','region-old','fill-old',heapState.old,16)+
    (heapState.large.length?renderRegion('Large Object Space','region-large','fill-large',heapState.large,4):'');
}

function renderStats(){
  const youngAlive=heapState.young.filter(o=>o.alive).length;
  const oldAlive=heapState.old.filter(o=>o.alive).length;
  const totalDead=heapState.young.filter(o=>!o.alive).length+heapState.old.filter(o=>!o.alive).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="label">Young Gen</div><div class="value val-young">${heapState.young.length}</div></div>
    <div class="stat"><div class="label">Old Gen</div><div class="value val-old">${heapState.old.length}</div></div>
    <div class="stat"><div class="label">Garbage</div><div class="value val-freed">${totalDead}</div></div>`;
}

function renderTab(){
  const s=SCENARIOS[curScenario];
  const step=s.steps[curStep];
  const el=document.getElementById('tabContent');

  if(currentTab==='detail'){
    let html='';
    if(step)html+=`<div class="info-card"><h4>Step ${curStep+1} / ${s.steps.length}</h4><p>${step.detail}</p></div>`;
    else html+=`<div class="info-card"><h4>${s.name}</h4><p>Step through to see how V8's garbage collector works.</p></div>`;
    el.innerHTML=html;
  }else{
    el.innerHTML=`
    <div class="info-card"><h4>V8 Heap Regions</h4>
    <table class="ref-table">
    <tr><th>Region</th><th>Size</th><th>GC Type</th></tr>
    <tr><td>Young (New Space)</td><td>1-8 MB</td><td>Scavenge (Minor GC)</td></tr>
    <tr><td>Old (Old Space)</td><td>~1.5 GB max</td><td>Mark-Sweep/Compact (Major GC)</td></tr>
    <tr><td>Large Object Space</td><td>Varies</td><td>Mark-Sweep (never moved)</td></tr>
    <tr><td>Code Space</td><td>Varies</td><td>Contains JIT-compiled code</td></tr>
    <tr><td>Map Space</td><td>Varies</td><td>Hidden class (Map) objects</td></tr>
    </table></div>
    <div class="info-card"><h4>GC Algorithms</h4>
    <table class="ref-table">
    <tr><th>Algorithm</th><th>Used for</th><th>Pause</th></tr>
    <tr><td>Scavenge</td><td>Young generation</td><td><1ms</td></tr>
    <tr><td>Mark-Sweep</td><td>Old generation</td><td>5-50ms</td></tr>
    <tr><td>Mark-Compact</td><td>Old gen (fragmented)</td><td>10-100ms</td></tr>
    <tr><td>Incremental Marking</td><td>Old gen (low pause)</td><td><2ms chunks</td></tr>
    <tr><td>Concurrent Marking</td><td>Old gen (background)</td><td>~0ms main</td></tr>
    </table></div>
    <div class="info-card"><h4>Generational Hypothesis</h4>
    <p style="font-size:.75rem;color:#aaa;line-height:1.5">Most objects die young. ~70-90% of objects become garbage before the next Minor GC. This is why V8 separates young and old generations: frequent, fast collection of young objects, infrequent collection of long-lived old objects.</p></div>
    <div class="info-card"><h4>Debugging Tools</h4>
    <table class="ref-table">
    <tr><td>--max-old-space-size=N</td><td>Set max heap size (MB)</td></tr>
    <tr><td>--trace-gc</td><td>Print GC events to stdout</td></tr>
    <tr><td>--expose-gc + gc()</td><td>Force GC from JS</td></tr>
    <tr><td>Chrome DevTools → Memory</td><td>Heap snapshots, allocation timeline</td></tr>
    <tr><td>process.memoryUsage()</td><td>Node.js heap/RSS stats</td></tr>
    </table></div>`;
  }
}

function stepForward(){
  const s=SCENARIOS[curScenario];
  if(curStep<s.steps.length-1){
    curStep++;
    // Reset heap and replay all steps
    heapState={young:s.initial.young.map(o=>({...o,state:'normal'})),old:s.initial.old.map(o=>({...o,state:'normal'})),large:s.initial.large.map(o=>({...o,state:'normal'}))};
    for(let i=0;i<=curStep;i++)applyStep(s.steps[i]);
    render();
  }
}
function stepBack(){if(curStep>=0){curStep--;reset();for(let i=0;i<=curStep;i++){applyStep(SCENARIOS[curScenario].steps[i])}render()}}
function autoPlay(){
  if(autoInterval){clearInterval(autoInterval);autoInterval=null;return}
  autoInterval=setInterval(()=>{
    if(curStep>=SCENARIOS[curScenario].steps.length-1){clearInterval(autoInterval);autoInterval=null;return}
    stepForward();
  },1500);
}
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().startsWith(t.slice(0,3))));
  renderTab();
}
init();
</script>
